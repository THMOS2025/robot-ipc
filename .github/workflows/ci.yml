name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  build-and-smoke-test:
    runs-on: ubuntu-latest
    container:
      image: alpine:3.21
    steps:
      - name: Install dependencies
        run: apk add --no-cache bash build-base cmake coreutils git libc6-compat linux-headers

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DBUILD_EXAMPLE=ON -DBUILD_C=ON -DBUILD_CPP=ON -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Run example smoke tests
        run: ./scripts/ci/run_example_smoke_tests.sh build

  python-wheel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build wheel from pyproject
        run: python -m build --wheel

  style:
    runs-on: ubuntu-latest
    container:
      image: alpine:3.21
    steps:
      - name: Install dependencies
        run: apk add --no-cache bash clang-extra-tools git libc6-compat

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set base revision
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "BASE_SHA=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_ENV"
          else
            echo "BASE_SHA=${{ github.event.before }}" >> "$GITHUB_ENV"
          fi

      - name: Run style checks
        run: ./scripts/ci/check_clang_format.sh
